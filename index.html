<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Training Summary | All Shifts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; }
        #pdfFrame { height: calc(100vh - 80px); width: 100%; border-radius: 12px; }
        .editor-sidebar { height: calc(100vh - 80px); scrollbar-width: thin; scrollbar-color: #1e293b #020617; }
        .bg-theater-nav { background-color: #0f172a; }
        .bg-sidebar { background-color: #020617; }
        
        /* Landing Page Input: White Text on Dark Background */
        #shiftInput {
            color: white !important;
            background-color: #1e293b;
            border-radius: 1rem;
            border: 2px solid #334155;
        }
        #shiftInput::placeholder { color: #64748b; }
    </style>
</head>
<body class="overflow-hidden min-h-screen flex flex-col font-sans">

    <div id="shiftOverlay" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[100]">
        <div class="bg-slate-900 p-12 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center border border-slate-800">
            <h2 class="text-3xl font-black text-white mb-2 uppercase tracking-tighter">Shift Entry</h2>
            <p class="text-slate-400 mb-10 font-medium">Select your shift number (1-6)</p>
            
            <input type="number" id="shiftInput" min="1" max="6" placeholder="0" 
                   class="w-32 text-center text-7xl font-black focus:border-blue-500 focus:outline-none mb-12 py-4 transition-all">

            <button id="startBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 transition shadow-xl active:scale-95">
                Open Dashboard
            </button>
        </div>
    </div>

    <nav class="h-20 bg-theater-nav border-b border-slate-800 px-8 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <h1 class="text-white font-black text-lg uppercase tracking-tighter">Report Training Summary | All Shifts</h1>
                <p id="activeShiftDisplay" class="text-blue-500 text-[10px] font-mono font-bold uppercase tracking-[0.2em]"></p>
            </div>
            <button id="changeShiftBtn" class="text-slate-500 hover:text-white text-[10px] uppercase font-bold border border-slate-800 px-3 py-1.5 rounded-lg transition-all">Change Shift</button>
        </div>
        
        <div class="flex gap-4">
            <button id="addBtn" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-xl font-bold text-xs transition border border-slate-700 uppercase tracking-widest">Add CSV</button>
            <button id="dlBtn" class="hidden bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold text-xs transition shadow-xl uppercase tracking-widest">Download PDF</button>
        </div>
    </nav>

    <main class="flex-grow flex bg-slate-950">
        <input type="file" id="csvFiles" accept=".csv" multiple class="hidden" />
        
        <div id="dropzone" class="w-full h-full flex flex-col items-center justify-center cursor-pointer hover:bg-slate-900/40 transition duration-1000 group">
            <div class="w-24 h-24 border-2 border-dashed border-slate-800 rounded-full flex items-center justify-center text-slate-800 mb-6 group-hover:border-blue-600 group-hover:text-blue-600 transition-all duration-500">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3" stroke-linecap="round"/></svg>
            </div>
            <p class="text-slate-700 font-black uppercase tracking-[0.3em] text-sm group-hover:text-slate-400 transition-colors">Select Shift Logs</p>
        </div>

        <div id="editorArea" class="hidden w-full flex">
            <aside class="editor-sidebar w-80 bg-sidebar border-r border-slate-800 p-6 overflow-y-auto shrink-0">
                <h3 class="text-slate-500 font-black text-[10px] uppercase tracking-[0.2em] mb-8 border-b border-slate-800 pb-2">Manage Cycles</h3>
                <div id="sessionList" class="space-y-8"></div>
            </aside>

            <section class="flex-grow bg-slate-950 p-4 relative flex items-center justify-center">
                <iframe id="pdfFrame" class="shadow-[0_20px_50px_rgba(0,0,0,0.5)] border-0"></iframe>
            </section>
        </div>
    </main>

    <script>
        const { jsPDF } = window.jspdf;
        let finalBlob = null;
        let sessions = []; 
        let shiftNumber = "";

        document.getElementById('startBtn').onclick = () => {
            const val = parseInt(document.getElementById('shiftInput').value);
            if (val >= 1 && val <= 6) {
                shiftNumber = val;
                document.getElementById('shiftOverlay').classList.add('hidden');
                document.getElementById('activeShiftDisplay').innerText = `SHIFT ${shiftNumber} ACTIVE`;
            } else { alert("Please select a shift between 1-6."); }
        };

        document.getElementById('changeShiftBtn').onclick = () => { if(confirm("Clear data and reset shift?")) location.reload(); };
        document.getElementById('addBtn').onclick = () => document.getElementById('csvFiles').click();
        document.getElementById('dropzone').onclick = () => document.getElementById('csvFiles').click();

        document.getElementById('csvFiles').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const res = await new Promise(r => Papa.parse(file, {header:true, skipEmptyLines:true, complete:r}));
                
                // --- ROBUST ROBOT ID DETECTION ---
                const robotRow = res.data.find(r => String(r['Event #'] || "").trim().toLowerCase() === 'robot');
                const robotId = robotRow ? robotRow['Side'] : "ares-60";
                
                // Extract original operators from metadata rows or first data rows
                const lRow = res.data.find(r => String(r['Event #']).trim() === 'Left Operator');
                const rRow = res.data.find(r => String(r['Event #']).trim() === 'Right Operator');
                
                const lName = lRow ? lRow['Side'] : (res.data.find(r => r.Side?.toLowerCase().trim() === 'left')?.Operator || "");
                const rName = rRow ? rRow['Side'] : (res.data.find(r => r.Side?.toLowerCase().trim() === 'right')?.Operator || "");
                
                // Filter only numeric logs for the data
                const logData = res.data.filter(r => !isNaN(parseInt(r['Event #'])));

                sessions.push({ 
                    id: Date.now() + Math.random(), 
                    name: file.name, 
                    data: logData,
                    robot: robotId,
                    left: { name: lName, visible: lName !== "" },
                    right: { name: rName, visible: rName !== "" }
                });
            }
            updateWorkspace();
        };

        function updateWorkspace() {
            const list = document.getElementById('sessionList');
            list.innerHTML = "";
            sessions.forEach((s) => {
                const card = document.createElement('div');
                card.className = "p-5 bg-slate-900/50 rounded-2xl border border-slate-800/50 space-y-5";
                card.innerHTML = `
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">${s.name}</p>
                    <div class="space-y-5">
                        <div class="${s.left.visible ? '' : 'opacity-25'}">
                            <div class="flex justify-between mb-1">
                                <label class="text-[8px] text-blue-500 font-bold uppercase tracking-tighter">Left Side</label>
                                <button onclick="toggleOp(${s.id}, 'left')" class="text-[8px] font-bold text-red-700 hover:text-red-500 uppercase tracking-tighter transition-colors">
                                    ${s.left.visible ? 'Remove' : 'Add'}
                                </button>
                            </div>
                            <input type="text" value="${s.left.name}" onchange="editOp(${s.id}, 'left', this.value)" ${s.left.visible ? '' : 'disabled'}
                                   class="w-full bg-slate-950 text-slate-300 text-xs p-3 rounded-xl border border-slate-800 outline-none focus:border-blue-600 transition-all">
                        </div>
                        <div class="${s.right.visible ? '' : 'opacity-25'}">
                            <div class="flex justify-between mb-1">
                                <label class="text-[8px] text-emerald-500 font-bold uppercase tracking-tighter">Right Side</label>
                                <button onclick="toggleOp(${s.id}, 'right')" class="text-[8px] font-bold text-red-700 hover:text-red-500 uppercase tracking-tighter transition-colors">
                                    ${s.right.visible ? 'Remove' : 'Add'}
                                </button>
                            </div>
                            <input type="text" value="${s.right.name}" onchange="editOp(${s.id}, 'right', this.value)" ${s.right.visible ? '' : 'disabled'}
                                   class="w-full bg-slate-950 text-slate-300 text-xs p-3 rounded-xl border border-slate-800 outline-none focus:border-emerald-600 transition-all">
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            if(sessions.length > 0) {
                document.getElementById('dropzone').classList.add('hidden');
                document.getElementById('editorArea').classList.remove('hidden');
                document.getElementById('dlBtn').classList.remove('hidden');
                renderPDF();
            }
        }

        window.toggleOp = (id, side) => {
            const s = sessions.find(x => x.id === id);
            s[side].visible = !s[side].visible;
            updateWorkspace();
        };

        window.editOp = (id, side, val) => {
            const s = sessions.find(x => x.id === id);
            s[side].name = val;
            renderPDF();
        };

        function renderPDF() {
            const doc = new jsPDF('p', 'mm', 'a4');
            const pW = 210, margin = 5, colGap = 5;
            const colW = (pW - (margin * 2) - colGap) / 2;
            let cycleTrack = {}; 

            sessions.forEach((session, idx) => {
                if (idx > 0) doc.addPage();
                doc.setFont("helvetica", "bold").setFontSize(22).setTextColor(0,0,0);
                doc.text(`Shift ${shiftNumber} Training Summary`, pW / 2, 20, { align: "center" });

                let x = margin;
                ['left', 'right'].forEach(side => {
                    const sideConfig = session[side];
                    // If 'Remove' was clicked, this visible flag is false, and we skip rendering the table
                    if (!sideConfig.visible) { x += colW + colGap; return; }

                    const sideData = session.data.filter(r => r.Side?.toLowerCase().trim() === side);
                    if (sideData.length === 0) return;

                    const name = sideConfig.name;
                    cycleTrack[name] = (cycleTrack[name] || 0) + 1;
                    const cNo = cycleTrack[name];

                    const start = sideData[0]['Timestamp (ISO)'], end = sideData[sideData.length-1]['Timestamp (ISO)'];
                    const dur = new Date(end) - new Date(start);
                    const rate = (sideData.length / (dur / 3600000)).toFixed(12);

                    doc.setFontSize(14).text(`${side.toUpperCase()} - CYCLE ${cNo}`, x, 32);
                    doc.autoTable({
                        startY: 35, margin: { left: x }, tableWidth: colW,
                        body: [
                            ["Robot ID", session.robot.toUpperCase()],
                            ["Cycle No.", cNo.toString()], ["Side", side], ["Operator", name],
                            ["Start Timestamp", start.replace('T', ' ').replace('Z', '')],
                            ["End Timestamp", end.replace('T', ' ').replace('Z', '')],
                            ["Duration", fmt(dur)], ["Rate Per Hour", rate],
                            ["Rate Per Day", (rate * 24).toFixed(12)], ["Total Step Completions", sideData.length.toString()]
                        ],
                        theme: 'grid', styles: { fontSize: 9.5, cellPadding: 3.5, textColor: [0,0,0] },
                        columnStyles: { 0: { fontStyle: 'bold', fillColor: [245, 245, 245], width: 40 } }
                    });
                    x += colW + colGap;
                });
            });

            finalBlob = doc.output('blob');
            document.getElementById('pdfFrame').src = URL.createObjectURL(finalBlob);
        }

        function fmt(ms) {
            if (!ms || isNaN(ms)) return "00m 00s";
            const s = Math.floor(ms / 1000);
            return `${Math.floor(s/60)}m ${s%60}s`;
        }

        document.getElementById('dlBtn').onclick = () => {
            const dateStr = new Date().toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' }).replace(/\//g, '-');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(finalBlob);
            link.download = `Shift ${shiftNumber} Summary - ${dateStr}.pdf`;
            link.click();
        };
    </script>
</body>
</html>
